name: Generate Xaycon Banners
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install requests Pillow python-dateutil

      - name: Run Banner Factory
        run: |
          mkdir -p thumbs
          cat << 'EOF' > scraper.py
          import os
          import io
          import requests
          from PIL import Image, ImageDraw, ImageFont

          API_URL = "https://sv.xaycontv.xyz/api/v1/external/fixtures/unfinished"
          BG_URL = "https://raw.githubusercontent.com/nghehoang007-wq/HFB321/main/HFB/Thump/nguonphat5.png"
          
          IMG_HEADERS = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

          def get_image(url):
              if not url: return None
              try:
                  res = requests.get(url, headers=IMG_HEADERS, timeout=10)
                  if res.status_code == 200:
                      return Image.open(io.BytesIO(res.content)).convert("RGBA")
              except Exception as e:
                  pass
              return None

          print("Đang tải ảnh nền...")
          try:
              bg_res = requests.get(BG_URL, timeout=15)
              # Resize nền về chuẩn 640x480 (Tỷ lệ 4:3)
              base_bg = Image.open(io.BytesIO(bg_res.content)).convert("RGBA").resize((640, 480))
          except:
              base_bg = Image.new('RGBA', (640, 480), (15, 23, 42, 255))

          try:
              response = requests.get(API_URL, timeout=30)
              matches = response.json().get('data', [])
              
              for match in matches:
                  match_id = str(match.get('id', ''))
                  home = match.get('homeTeam', {})
                  away = match.get('awayTeam', {})
                  
                  thumb_path = f"thumbs/{match_id}.png"

                  bg_copy = base_bg.copy()
                  draw = ImageDraw.Draw(bg_copy)
                  
                  try:
                      font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 22)
                  except:
                      font = ImageFont.load_default()

                  # ===============================================
                  # ĐỘI NHÀ (Dạt sang Trái, căn giữa chiều cao)
                  # ===============================================
                  h_img_raw = get_image(home.get('logoUrl'))
                  if h_img_raw:
                      h_img = h_img_raw.resize((130, 130), Image.Resampling.LANCZOS)
                      # Đẩy ra mép trái (X=95), hạ xuống giữa (Y=140)
                      bg_copy.paste(h_img, (95, 140), h_img)
                  
                  h_name = home.get('name', 'HOME')[:14].upper()
                  # Tâm logo = 95 + (130/2) = 160. Neo chữ ở X=160, Y=285
                  draw.text((160, 287), h_name, font=font, fill="black", anchor="mt")
                  draw.text((158, 285), h_name, font=font, fill="white", anchor="mt")

                  # ===============================================
                  # ĐỘI KHÁCH (Dạt sang Phải, căn giữa chiều cao)
                  # ===============================================
                  a_img_raw = get_image(away.get('logoUrl'))
                  if a_img_raw:
                      a_img = a_img_raw.resize((130, 130), Image.Resampling.LANCZOS)
                      # Đẩy ra mép phải (X=415), hạ xuống giữa (Y=140)
                      bg_copy.paste(a_img, (415, 140), a_img)
                  
                  a_name = away.get('name', 'AWAY')[:14].upper()
                  # Tâm logo = 415 + (130/2) = 480. Neo chữ ở X=480, Y=285
                  draw.text((480, 287), a_name, font=font, fill="black", anchor="mt")
                  draw.text((478, 285), a_name, font=font, fill="white", anchor="mt")

                  bg_copy.save(thumb_path, "PNG")
                  print(f"Đã vẽ xong banner 4:3 (Dãn đều 2 bên): {match_id} ({h_name} - {a_name})")

          except Exception as e:
              print(f"Lỗi API: {e}")
          EOF
          python3 scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add thumbs/
          git commit -m "Banner 4:3, dãn đều logo 2 bên, căn giữa chuẩn" || echo "No changes"
          git push
