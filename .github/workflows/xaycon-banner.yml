name: Generate Xaycon Banners
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install requests Pillow

      - name: Run Banner Factory
        run: |
          mkdir -p thumbs
          cat << 'EOF' > scraper.py
          import os
          import io
          import requests
          from PIL import Image, ImageDraw, ImageFont

          API_URL = "https://sv.xaycontv.xyz/api/v1/external/fixtures/unfinished"
          BG_URL = "https://raw.githubusercontent.com/nghehoang007-wq/HFB321/main/HFB/Thump/nguonphat5.png"
          DEFAULT_LOGO = "https://i.imgur.com/30aaqin.png"

          def get_image(url):
              try:
                  res = requests.get(url, timeout=5)
                  return Image.open(io.BytesIO(res.content)).convert("RGBA")
              except:
                  res = requests.get(DEFAULT_LOGO)
                  return Image.open(io.BytesIO(res.content)).convert("RGBA")

          # Tải nền
          bg_res = requests.get(BG_URL, timeout=10)
          base_bg = Image.open(io.BytesIO(bg_res.content)).convert("RGBA").resize((640, 360))

          try:
              response = requests.get(API_URL, timeout=30)
              matches = response.json().get('data', [])
              
              for match in matches:
                  match_id = str(match.get('id', ''))
                  home = match.get('homeTeam', {})
                  away = match.get('awayTeam', {})
                  
                  thumb_path = f"thumbs/{match_id}.png"
                  if os.path.exists(thumb_path): continue

                  bg_copy = base_bg.copy()
                  draw = ImageDraw.Draw(bg_copy)
                  # Thử dùng font mặc định của Ubuntu, nếu không có thì dùng font cơ bản
                  try:
                      font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", 20)
                  except:
                      font = ImageFont.load_default()

                  # Xử lý Đội Nhà
                  h_img = get_image(home.get('logoUrl')).resize((130, 130))
                  bg_copy.paste(h_img, (95, 80), h_img) # Tọa độ Logo Trái
                  h_name = home.get('name', 'Home')[:15].upper()
                  draw.text((160, 230), h_name, font=font, fill="white", anchor="mt")

                  # Xử lý Đội Khách
                  a_img = get_image(away.get('logoUrl')).resize((130, 130))
                  bg_copy.paste(a_img, (415, 80), a_img) # Tọa độ Logo Phải
                  a_name = away.get('name', 'Away')[:15].upper()
                  draw.text((480, 230), a_name, font=font, fill="white", anchor="mt")

                  # Chữ VS ở giữa
                  draw.text((320, 140), "VS", font=font, fill="#ef4444", anchor="mm")

                  bg_copy.save(thumb_path, "PNG")
                  print(f"Done: {match_id}")

          except Exception as e:
              print(f"Error: {e}")
          EOF
          python3 scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add thumbs/
          git commit -m "Update banners with names" || echo "No changes"
          git push
