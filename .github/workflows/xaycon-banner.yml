name: Xaycon Banner Factory
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install requests Pillow python-dateutil

      - name: Run Factory Script
        run: |
          mkdir -p thumbs
          cat << 'EOF' > scraper.py
          import os
          import io
          import requests
          from PIL import Image, ImageDraw, ImageFont

          API_URL = "https://sv.xaycontv.xyz/api/v1/external/fixtures/unfinished"
          BG_URL = "https://raw.githubusercontent.com/nghehoang007-wq/HFB321/main/HFB/Thump/nguonphat5.png"
          HEADERS = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}

          def get_img(url):
              if not url: return None
              try:
                  res = requests.get(url, headers=HEADERS, timeout=10)
                  if res.status_code == 200:
                      return Image.open(io.BytesIO(res.content)).convert("RGBA")
              except: return None
              return None

          # 1. Tải nền chuẩn
          try:
              bg_res = requests.get(BG_URL, timeout=15)
              base_bg = Image.open(io.BytesIO(bg_res.content)).convert("RGBA").resize((640, 360))
          except:
              base_bg = Image.new('RGBA', (640, 360), (15, 23, 42, 255))

          # 2. Load Font (Cỡ 22 cho tên đội, 45 cho VS)
          try:
              font_path = "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
              font_name = ImageFont.truetype(font_path, 22)
              font_vs = ImageFont.truetype(font_path, 45)
          except:
              font_name = ImageFont.load_default()
              font_vs = ImageFont.load_default()

          try:
              response = requests.get(API_URL, headers=HEADERS, timeout=30)
              matches = response.json().get('data', [])
              
              for m in matches:
                  match_id = str(m.get('id', ''))
                  h_team = m.get('homeTeam', {})
                  a_team = m.get('awayTeam', {})
                  
                  path = f"thumbs/{match_id}.png"
                  # Nếu bác muốn ép vẽ lại toàn bộ để cập nhật tên đội, hãy bỏ dấu # dòng dưới
                  # if os.path.exists(path): continue

                  img = base_bg.copy()
                  draw = ImageDraw.Draw(img)

                  # VẼ ĐỘI NHÀ (Trái)
                  h_logo = get_img(h_team.get('logoUrl'))
                  if h_logo:
                      h_logo = h_logo.resize((140, 140), Image.Resampling.LANCZOS)
                      img.paste(h_logo, (90, 70), h_logo)
                  
                  h_txt = h_team.get('name', 'HOME').upper()[:14]
                  # Vẽ viền đen cho chữ nổi bật
                  draw.text((160, 237), h_txt, font=font_name, fill="black", anchor="mt")
                  draw.text((158, 235), h_txt, font=font_name, fill="white", anchor="mt")

                  # VẼ ĐỘI KHÁCH (Phải)
                  a_logo = get_img(a_team.get('logoUrl'))
                  if a_logo:
                      a_logo = a_logo.resize((140, 140), Image.Resampling.LANCZOS)
                      img.paste(a_logo, (410, 70), a_logo)
                  
                  a_txt = a_team.get('name', 'AWAY').upper()[:14]
                  draw.text((480, 237), a_txt, font=font_name, fill="black", anchor="mt")
                  draw.text((478, 235), a_txt, font=font_name, fill="white", anchor="mt")

                  # VẼ CHỮ VS
                  draw.text((320, 140), "VS", font=font_vs, fill="#ef4444", anchor="mm")

                  img.save(path, "PNG")
                  print(f"Created banner for: {match_id}")

          except Exception as e:
              print(f"Error: {e}")
          EOF
          python3 scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add thumbs/
          git commit -m "Update banners with team names" || echo "No changes"
          git push
